<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat script</title>
    <link rel="stylesheet" href="live-agent/live-agent.css" />
    <style>
      body { background: #e8f4fc; }
      .tx-page { max-width: 640px; margin: 24px auto; padding: 0 16px; }
      .tx-head { margin-bottom: 16px; }
      .tx-head h1 { margin: 0 0 8px; font-size: 1.25rem; }
      .tx-back { color: #0284c7; text-decoration: none; font-weight: 600; font-size: 0.875rem; }
      .tx-box {
        background: #fff;
        border: 1px solid #dbe5ec;
        border-radius: 12px;
        padding: 16px;
        min-height: 200px;
      }
    </style>
  </head>
  <body>
    <div class="tx-page">
      <header class="tx-head">
        <a class="tx-back" href="live-agent/">← Service desk</a>
        <h1 id="tx-title">Chat script</h1>
      </header>
      <div id="tx-messages" class="tx-box la-messages"></div>
    </div>
    <script>
      (function () {
        var KEY = 'qa_live_agent_desk';
        var params = new URLSearchParams(location.search);
        var session = params.get('session') || '';
        var d = {};
        try { d = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch (e) {}
        if (!d.token) { location.href = 'live-agent/settings.html'; return; }
        var base = (d.apiBase || location.origin).replace(/\/$/, '');
        document.getElementById('tx-title').textContent = 'Chat · ' + session.slice(0, 14) + '…';
        fetch(base + '/api/transcript?sessionId=' + encodeURIComponent(session), {
          headers: { 'X-Agent-Token': d.token }
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var box = document.getElementById('tx-messages');
            if (!data.ok || !(data.turns && data.turns.length)) {
              box.innerHTML = '<p style="color:#64748b;text-align:center">No messages saved yet.</p>';
              return;
            }
            data.turns.forEach(function (m) {
              var div = document.createElement('div');
              div.className = 'la-msg la-msg--' + (m.role === 'user' ? 'user' : m.role === 'agent' ? 'agent' : 'bot');
              var meta = document.createElement('div');
              meta.className = 'la-msg__meta';
              meta.textContent = (m.role || '') + ' · ' + (m.at || '').replace('T', ' ').slice(0, 19);
              var text = document.createElement('div');
              text.className = 'la-msg__text';
              text.textContent = m.text || '';
              div.appendChild(meta);
              div.appendChild(text);
              box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
          });
      })();
    </script>
  </body>
</html>
