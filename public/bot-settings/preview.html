<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=520, initial-scale=1" />
  <title>Chatbot preview</title>
  <link rel="stylesheet" href="/widget/chat-widget.css" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(160deg, #f0f4f8 0%, #e8eef5 100%);
    }
    .preview-hint {
      position: fixed;
      top: 8px;
      left: 0;
      right: 0;
      z-index: 0;
      font: 12px/1.4 system-ui, sans-serif;
      color: #94a3b8;
      text-align: center;
      pointer-events: none;
      margin: 0;
    }
    /* Same as live embed: fixed bottom-right inside this frame */
    body.qa-bot-preview .qa-widget {
      position: fixed !important;
      z-index: 2;
    }
    body.qa-bot-preview .qa-panel {
      width: 400px !important;
      max-width: 400px !important;
    }
    /* iframe 100vh ≠ frame height — use explicit panel height from config */
    body.qa-bot-preview .qa-panel,
    body.qa-bot-preview .qa-widget--chat-open .qa-panel {
      height: var(--qa-panel-height, 520px) !important;
      max-height: var(--qa-panel-height, 520px) !important;
      min-height: var(--qa-panel-height, 520px) !important;
    }
  </style>
</head>
<body class="qa-bot-preview">
  <p class="preview-hint" id="previewHint">Loading preview…</p>
  <script src="/company.config.js"></script>
  <script src="/widget/date-display.js"></script>
  <script src="/widget/message-syntax.js"></script>
  <script src="/widget/chat-form.js"></script>
  <script src="/widget/chat-widget.js"></script>
  <script src="preview.js"></script>
</body>
</html>
