<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat Analytics</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="dash-app">
      <header class="dash-header">
        <div>
          <h1>Chat Analytics</h1>
          <p class="dash-muted">Overview of bot chats and live agent queue</p>
        </div>
        <nav class="dash-nav">
          <a href="documents.html" class="dash-btn dash-btn--ghost">Documents</a>
          <a href="../live-agent/" class="dash-btn dash-btn--ghost">Service desk</a>
          <button type="button" id="dash-refresh" class="dash-btn dash-btn--primary">Refresh</button>
        </nav>
      </header>
      <main class="dash-grid" id="dash-cards">
        <p class="dash-loading">Loading…</p>
      </main>
      <section class="dash-recent">
        <h2>Recent sessions</h2>
        <div id="dash-recent-list" class="dash-recent-list"></div>
      </section>
    </div>
    <script src="dashboard.js"></script>
  </body>
</html>
