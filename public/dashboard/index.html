<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="dashboard-nav.css?v=20260610f" />
  </head>
  <body>
    <div class="dash-page-content" style="display:none">
      <p class="dash-muted" id="dash-home-intro">Select a section below or use the sidebar. Bot-specific pages follow the active bot.</p>
      <div class="dash-home-grid" id="dash-home-grid"></div>
    </div>
    <script src="desk-auth.js"></script>
    <script src="dashboard-nav.js?v=20260610f"></script>
    <script>
      (function () {
        var bid = DashboardNav.getBid();
        var bot = DashboardNav.BOTS.find(function (b) { return b.id === bid; }) || DashboardNav.BOTS[0];

        DashboardNav.mount({
          active: 'home',
          title: 'Home',
          subtitle: 'Bot: ' + bot.name + ' (ID ' + bot.id + ') — change bot in the sidebar dropdown',
        });

        var grid = document.getElementById('dash-home-grid');
        if (!grid) return;

        var homeCards = [
          { key: 'uc-conversations', label: 'Chatbot conversations', desc: 'Leads, transcripts & chat stats', kind: 'bot' },
          { key: 'queryanalytics', label: 'Customer questions', desc: 'Answered vs unanswered queries', kind: 'bot' },
          { key: 'appointments', label: 'Appointments', desc: 'Review and approve bookings', kind: 'common' },
          { key: 'documents', label: 'Customer uploads', desc: 'Files sent via chat or forms', kind: 'common' },
          { key: 'uiux-setting', label: 'Chatbot appearance', desc: 'Colors, text, launcher & welcome screen', kind: 'bot' },
          { key: 'supersetting', label: 'Advanced configuration', desc: 'Power-user bot options', kind: 'bot' },
          { key: 'live-agent', label: 'Live chat inbox', desc: 'Reply to visitors in real time', kind: 'common' },
          { key: 'ua-conversations', label: 'Agent conversations', desc: 'Chats handled by your team', kind: 'common' },
          { key: 'live-agent/settings', label: 'Live chat setup', desc: 'Agents, departments & viewer secret', kind: 'common' },
          { key: 'manage-access', label: 'Access permissions', desc: 'Who can open which pages', kind: 'common' },
        ];

        function card(item) {
          var href = DashboardNav.navHref(item.key, bid);
          return (
            '<a class="dash-home-card dash-home-card--' + item.kind + '" href="' + href + '">' +
            '<strong>' + item.label + '</strong>' +
            '<span>' + item.desc + '</span></a>'
          );
        }

        grid.innerHTML = homeCards.map(card).join('');
      })();
    </script>
  </body>
</html>
