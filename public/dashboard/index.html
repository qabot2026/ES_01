<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="dashboard-nav.css?v=20260610c" />
  </head>
  <body>
    <div class="dash-page-content" style="display:none">
      <p class="dash-muted" id="dash-home-intro">Select a section below or use the sidebar. Bot-specific pages follow the active bot.</p>
      <div class="dash-home-grid" id="dash-home-grid"></div>
    </div>
    <script src="desk-auth.js"></script>
    <script src="dashboard-nav.js?v=20260610c"></script>
    <script>
      (function () {
        var bid = DashboardNav.getBid();
        var bot = DashboardNav.BOTS.find(function (b) { return b.id === bid; }) || DashboardNav.BOTS[0];

        DashboardNav.mount({
          active: 'home',
          title: 'Dashboard home',
          subtitle: 'Bot: ' + bot.name + ' (ID ' + bot.id + ') — change bot in the sidebar dropdown',
        });

        var grid = document.getElementById('dash-home-grid');
        if (!grid) return;

        var botCards = [
          { key: 'uc-conversations', label: 'User chatbot analytics', desc: 'Visual chat stats & leads' },
          { key: 'queryanalytics', label: 'Query analytics', desc: 'Answered vs unanswered queries' },
          { key: 'uiux-setting', label: 'UI / UX settings', desc: 'Chatbot look & behaviour' },
          { key: 'supersetting', label: 'Super settings', desc: 'Advanced bot configuration' },
        ];
        var commonCards = [
          { key: 'ua-conversations', label: 'User agent analytics', desc: 'Human agent conversations' },
          { key: 'live-agent', label: 'Service desk', desc: 'Live agent chat panel' },
          { key: 'appointments', label: 'Appointments', desc: 'Booked appointments desk' },
          { key: 'live-agent/settings', label: 'Service desk settings', desc: 'Live chat configuration' },
          { key: 'documents', label: 'Documents', desc: 'Files saved on bucket' },
          { key: 'manage-access', label: 'Manage access', desc: 'Who can open which pages' },
        ];

        function card(item, kind) {
          var href = DashboardNav.navHref(item.key, bid);
          return (
            '<a class="dash-home-card dash-home-card--' + kind + '" href="' + href + '">' +
            '<strong>' + item.label + '</strong>' +
            '<span>' + item.desc + '</span></a>'
          );
        }

        grid.innerHTML =
          botCards.map(function (c) { return card(c, 'bot'); }).join('') +
          commonCards.map(function (c) { return card(c, 'common'); }).join('');
      })();
    </script>
  </body>
</html>
