<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Customer documents</title>
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="documents.css" />
  </head>
  <body>
    <div class="dash-app docs-app">
      <header class="dash-header">
        <div>
          <h1>Customer documents</h1>
          <p class="dash-muted">Files uploaded through the chatbot forms</p>
        </div>
        <nav class="dash-nav">
          <a href="index.html" class="dash-btn dash-btn--ghost">Analytics</a>
          <a href="../live-agent/" class="dash-btn dash-btn--ghost">Service desk</a>
          <button type="button" id="docs-refresh" class="dash-btn dash-btn--primary">Refresh</button>
        </nav>
      </header>

      <section class="dash-grid docs-summary" aria-label="Summary">
        <div class="dash-card">
          <div class="dash-card__value" id="docs-count-submissions">—</div>
          <div class="dash-card__label">Submissions</div>
        </div>
        <div class="dash-card">
          <div class="dash-card__value" id="docs-count-files">—</div>
          <div class="dash-card__label">Documents</div>
        </div>
        <div class="dash-card">
          <div class="dash-card__value" id="docs-count-size">—</div>
          <div class="dash-card__label">Total size</div>
        </div>
      </section>

      <section class="docs-panel">
        <div class="docs-panel__toolbar">
          <label class="docs-search-label">
            <span class="visually-hidden">Search</span>
            <input
              type="search"
              id="docs-search"
              class="docs-search"
              placeholder="Search by name, mobile, file…"
              autocomplete="off"
            />
          </label>
          <span class="docs-showing" id="docs-showing"></span>
        </div>

        <div id="docs-alert" class="docs-alert" hidden></div>

        <div class="docs-table-wrap">
          <table class="docs-table" id="docs-table">
            <thead>
              <tr>
                <th scope="col">Document</th>
                <th scope="col">Tag</th>
                <th scope="col">Customer</th>
                <th scope="col">Mobile</th>
                <th scope="col">Date</th>
                <th scope="col">Size</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody id="docs-tbody">
              <tr>
                <td colspan="7" class="docs-table__empty">Loading…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
    <script src="documents.js"></script>
  </body>
</html>
