<!DOCTYPE html>
<html lang="en">
<!--
  Shortcut: conversations.html?apiBase=https://YOUR-API.up.railway.app
  Redirects to the full inbox UI at /conversations-sheet
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conversations — Sheet inbox</title>
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search);
      var q = (p.get("apiBase") || "").trim().replace(/\/+$/, "");
      var base = q || window.location.origin;
      window.location.replace(base + "/conversations-sheet");
    })();
  </script>
</head>
<body></body>
</html>
