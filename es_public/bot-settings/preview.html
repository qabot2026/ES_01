<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=520, initial-scale=1" />
  <title>Chatbot preview</title>
  <link rel="stylesheet" href="/widget/chat-widget.css" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(160deg, #f0f4f8 0%, #e8eef5 100%);
    }
    .preview-hint {
      position: fixed;
      top: 8px;
      left: 0;
      right: 0;
      z-index: 0;
      font: 12px/1.4 system-ui, sans-serif;
      color: #94a3b8;
      text-align: center;
      pointer-events: none;
      margin: 0;
    }
    /* Fixed bottom-right; launcher anchored to bottom of widget box */
    body.qa-bot-preview .qa-widget {
      position: fixed !important;
      top: auto !important;
      z-index: 2;
    }
    body.qa-bot-preview .qa-launcher-wrap {
      position: absolute !important;
      bottom: 0 !important;
      right: 0 !important;
      left: auto !important;
      z-index: 3;
    }
    body.qa-bot-preview .qa-widget--left .qa-launcher-wrap {
      right: auto !important;
      left: 0 !important;
    }
    body.qa-bot-preview .qa-launcher-strip-wrap {
      position: absolute !important;
      right: 0 !important;
      left: auto !important;
      z-index: 2;
    }
    body.qa-bot-preview .qa-widget--left .qa-launcher-strip-wrap {
      right: auto !important;
      left: 0 !important;
    }
    body.qa-bot-preview .qa-panel {
      position: absolute !important;
      right: 0 !important;
      left: auto !important;
      width: 400px !important;
      max-width: 400px !important;
    }
    body.qa-bot-preview .qa-widget--left .qa-panel {
      right: auto !important;
      left: 0 !important;
    }
    /* iframe 100vh ≠ frame height — use explicit panel height from config */
    body.qa-bot-preview .qa-panel,
    body.qa-bot-preview .qa-widget--chat-open .qa-panel {
      height: var(--es-panel-height, 520px) !important;
      max-height: var(--es-panel-height, 520px) !important;
      min-height: var(--es-panel-height, 520px) !important;
    }
  </style>
</head>
<body class="qa-bot-preview">
  <p class="preview-hint" id="previewHint">Loading preview…</p>
  <script src="/bot-configs/bootstrap.js"></script>
  <script src="/bot-configs/load-chain.js"></script>
  <script>
    ESLoadScriptChain([
      '/company.config.js',
      '/widget/date-display.js',
      '/widget/message-syntax.js',
      '/widget/chat-form.js',
      '/widget/chat-widget.js',
      '/bot-settings/preview.js'
    ]);
  </script>
</body>
</html>
